name: Meta Refresh + Reschedule Progress

on:
  workflow_dispatch:
    inputs:
      expected_build_id:
        description: Exact deployed build SHA to progress
        required: true
        type: string
      business_id:
        description: Meta business id to progress
        required: true
        type: string
      max_passes:
        description: Maximum remote refresh/reschedule passes
        required: false
        default: "6"
        type: string

concurrency:
  group: meta-refresh-reschedule-progress-production
  cancel-in-progress: false

jobs:
  progress:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Resolve pinned control-plane rows
        id: control_plane
        shell: bash
        env:
          EXPECTED_BUILD_ID: ${{ inputs.expected_build_id }}
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
          HETZNER_PORT: ${{ secrets.HETZNER_PORT }}
          HETZNER_KNOWN_HOSTS: ${{ secrets.HETZNER_KNOWN_HOSTS }}
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${HETZNER_USER}" ] || [ -z "${HETZNER_SSH_KEY}" ] || [ -z "${HETZNER_KNOWN_HOSTS}" ]; then
            echo "Missing required Hetzner remediation secrets."
            exit 1
          fi

          resolve_host() {
            host="$1"
            if [ -z "${host}" ]; then
              return 0
            fi
            python3 -c 'import socket, sys; print(socket.gethostbyname(sys.argv[1]))' "${host}" 2>/dev/null || printf '%s\n' "${host}"
          }

          PRIMARY_HOST="${HETZNER_HOST}"
          if [ -z "${PRIMARY_HOST}" ]; then
            PRIMARY_HOST="$(resolve_host "adsecute.com")"
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${HETZNER_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${HETZNER_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          ssh-keyscan -H "${PRIMARY_HOST}" 2>/dev/null >> ~/.ssh/known_hosts || true
          chmod 644 ~/.ssh/known_hosts

          PORT="${HETZNER_PORT:-22}"
          SSH_OPTS=(
            -i ~/.ssh/id_ed25519
            -p "${PORT}"
            -o BatchMode=yes
            -o ServerAliveInterval=30
            -o ServerAliveCountMax=6
            -o TCPKeepAlive=yes
          )

          EXPECTED_BUILD_ID_Q="$(printf "%q" "${EXPECTED_BUILD_ID}")"

          ssh "${SSH_OPTS[@]}" "${HETZNER_USER}@${PRIMARY_HOST}" \
            "EXPECTED_BUILD_ID=${EXPECTED_BUILD_ID_Q} bash -seuo pipefail" <<'EOF' > control-plane-status.json
            cd /var/www/adsecute

            read_build_info() {
              response_file="$(mktemp)"
              http_status="$(
                curl -sS -o "${response_file}" -w '%{http_code}' \
                  "http://127.0.0.1:3000/api/build-info"
              )"
              response_json="$(cat "${response_file}")"
              rm -f "${response_file}"

              if [ "${http_status}" = "200" ]; then
                printf '%s\n' "${response_json}"
                return 0
              fi

              printf 'build_info_http_%s\n' "${http_status}" >&2
              printf '%s\n' "${response_json}" >&2
              return 1
            }

            persist_current_build_control_plane() {
              cron_secret="$(docker compose exec -T web node -e 'process.stdout.write(process.env.CRON_SECRET || "")')"
              if [ -z "${cron_secret}" ]; then
                echo "CRON_SECRET is missing from the web runtime."
                return 1
              fi

              response_file="$(mktemp)"
              http_status="$(
                curl -sS -o "${response_file}" -w '%{http_code}' -X POST \
                  "http://127.0.0.1:3000/api/sync/cron?controlPlaneOnly=1&buildId=${EXPECTED_BUILD_ID}" \
                  -H "Authorization: Bearer ${cron_secret}"
              )"
              response_json="$(cat "${response_file}")"
              rm -f "${response_file}"
              printf '%s\n' "${response_json}" >&2

              classification="$(
                RESPONSE_JSON="${response_json}" HTTP_STATUS="${http_status}" python3 -c 'import json, os; status = int(os.environ["HTTP_STATUS"]); payload = json.loads(os.environ["RESPONSE_JSON"] or "{}"); error = (payload.get("error") or "").strip(); print("ok" if status == 200 and payload.get("ok") is True else "retryable" if error in {"gate_evaluation_failed", "repair_plan_failed"} or status in {500, 503} else "fatal")'
              )"

              case "${classification}" in
                ok)
                  return 0
                  ;;
                retryable)
                  return 2
                  ;;
                *)
                  return 1
                  ;;
              esac
            }

            attempts=15
            delay_seconds=5

            for attempt in $(seq 1 "${attempts}"); do
              build_info_json=""
              if ! build_info_json="$(read_build_info)"; then
                if [ "${attempt}" -lt "${attempts}" ]; then
                  sleep "${delay_seconds}"
                  continue
                fi
                exit 1
              fi

              if BUILD_INFO_JSON="${build_info_json}" EXPECTED_BUILD_ID="${EXPECTED_BUILD_ID}" python3 -c 'import json, os, sys; payload = json.loads(os.environ["BUILD_INFO_JSON"]); expected = os.environ["EXPECTED_BUILD_ID"].strip(); identity = payload.get("controlPlaneIdentity") or {}; deploy_gate = payload.get("deployGate") or {}; repair_plan = payload.get("repairPlan") or {}; sys.exit(0 if ((payload.get("buildId") or "").strip() == expected and (identity.get("buildId") or "").strip() == expected and ((payload.get("controlPlanePersistence") or {}).get("exactRowsPresent")) is True and (deploy_gate.get("verdict") or "").strip() == "pass" and repair_plan.get("eligible") is True) else 1)'
              then
                printf '%s\n' "${build_info_json}"
                exit 0
              fi

              persist_status=0
              persist_current_build_control_plane || persist_status=$?
              if [ "${persist_status}" -eq 1 ]; then
                exit 1
              fi

              if [ "${attempt}" -lt "${attempts}" ]; then
                sleep "${delay_seconds}"
              fi
            done

            printf '%s\n' "${build_info_json}"
            exit 1
          EOF

      - name: Run remote refresh/reschedule loop
        env:
          EXPECTED_BUILD_ID: ${{ inputs.expected_build_id }}
          BUSINESS_ID: ${{ inputs.business_id }}
          MAX_PASSES: ${{ inputs.max_passes }}
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
          HETZNER_PORT: ${{ secrets.HETZNER_PORT }}
          HETZNER_KNOWN_HOSTS: ${{ secrets.HETZNER_KNOWN_HOSTS }}
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${HETZNER_USER}" ] || [ -z "${HETZNER_SSH_KEY}" ] || [ -z "${HETZNER_KNOWN_HOSTS}" ]; then
            echo "Missing required Hetzner remediation secrets."
            exit 1
          fi

          resolve_host() {
            host="$1"
            if [ -z "${host}" ]; then
              return 0
            fi
            python3 -c 'import socket, sys; print(socket.gethostbyname(sys.argv[1]))' "${host}" 2>/dev/null || printf '%s\n' "${host}"
          }

          PRIMARY_HOST="${HETZNER_HOST}"
          if [ -z "${PRIMARY_HOST}" ]; then
            PRIMARY_HOST="$(resolve_host "adsecute.com")"
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${HETZNER_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${HETZNER_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          ssh-keyscan -H "${PRIMARY_HOST}" 2>/dev/null >> ~/.ssh/known_hosts || true
          chmod 644 ~/.ssh/known_hosts

          PORT="${HETZNER_PORT:-22}"
          SSH_OPTS=(
            -i ~/.ssh/id_ed25519
            -p "${PORT}"
            -o BatchMode=yes
            -o ServerAliveInterval=30
            -o ServerAliveCountMax=6
            -o TCPKeepAlive=yes
          )

          EXPECTED_BUILD_ID_Q="$(printf "%q" "${EXPECTED_BUILD_ID}")"
          BUSINESS_ID_Q="$(printf "%q" "${BUSINESS_ID}")"
          MAX_PASSES_Q="$(printf "%q" "${MAX_PASSES}")"

          ssh "${SSH_OPTS[@]}" "${HETZNER_USER}@${PRIMARY_HOST}" \
            "EXPECTED_BUILD_ID=${EXPECTED_BUILD_ID_Q} BUSINESS_ID=${BUSINESS_ID_Q} MAX_PASSES=${MAX_PASSES_Q} bash -seuo pipefail" <<'EOF'
            cd /var/www/adsecute

            runtime_service="worker"
            if ! docker compose ps --status running --services | grep -qx "worker"; then
              docker compose up -d worker >/dev/null
              sleep 5
            fi
            if ! docker compose ps --status running --services | grep -qx "worker"; then
              echo "worker service is not running and could not be started"
              exit 1
            fi

            read_build_info() {
              response_file="$(mktemp)"
              http_status="$(
                curl -sS -o "${response_file}" -w '%{http_code}' \
                  "http://127.0.0.1:3000/api/build-info"
              )"
              response_json="$(cat "${response_file}")"
              rm -f "${response_file}"

              if [ "${http_status}" = "200" ]; then
                printf '%s\n' "${response_json}"
                return 0
              fi

              printf 'build_info_http_%s\n' "${http_status}" >&2
              printf '%s\n' "${response_json}" >&2
              return 1
            }

            persist_current_build_control_plane() {
              cron_secret="$(docker compose exec -T web node -e 'process.stdout.write(process.env.CRON_SECRET || "")')"
              if [ -z "${cron_secret}" ]; then
                echo "CRON_SECRET is missing from the web runtime."
                return 1
              fi

              response_file="$(mktemp)"
              http_status="$(
                curl -sS -o "${response_file}" -w '%{http_code}' -X POST \
                  "http://127.0.0.1:3000/api/sync/cron?controlPlaneOnly=1&buildId=${EXPECTED_BUILD_ID}" \
                  -H "Authorization: Bearer ${cron_secret}"
              )"
              response_json="$(cat "${response_file}")"
              rm -f "${response_file}"
              printf '%s\n' "${response_json}" >&2

              classification="$(
                RESPONSE_JSON="${response_json}" HTTP_STATUS="${http_status}" python3 -c 'import json, os; status = int(os.environ["HTTP_STATUS"]); payload = json.loads(os.environ["RESPONSE_JSON"] or "{}"); error = (payload.get("error") or "").strip(); print("ok" if status == 200 and payload.get("ok") is True else "retryable" if error in {"gate_evaluation_failed", "repair_plan_failed"} or status in {500, 503} else "fatal")'
              )"

              case "${classification}" in
                ok)
                  return 0
                  ;;
                retryable)
                  return 2
                  ;;
                *)
                  return 1
                  ;;
              esac
            }

            for pass in $(seq 1 "${MAX_PASSES}"); do
              docker compose exec -T "${runtime_service}" sh -lc "\
                export NODE_ENV=production; \
                node --import tsx scripts/meta-refresh-state.ts '${BUSINESS_ID}'\
              " </dev/null

              docker compose exec -T "${runtime_service}" sh -lc "\
                export NODE_ENV=production; \
                export SYNC_WORKER_MODE=1; \
                export META_WORKER_ID='meta-refresh-reschedule:${BUSINESS_ID}:${pass}'; \
                node --import tsx scripts/meta-reschedule.ts '${BUSINESS_ID}'\
              " </dev/null

              persist_status=0
              persist_current_build_control_plane || persist_status=$?
              if [ "${persist_status}" -eq 1 ]; then
                exit 1
              fi

              build_info_json=""
              if ! build_info_json="$(read_build_info)"; then
                if [ "${pass}" -lt "${MAX_PASSES}" ]; then
                  sleep 20
                  continue
                fi
                exit 1
              fi
              printf '%s\n' "${build_info_json}" > current-build-info.json

              if BUILD_INFO_JSON="${build_info_json}" EXPECTED_BUILD_ID="${EXPECTED_BUILD_ID}" python3 -c 'import json, os, sys; payload=json.loads(os.environ["BUILD_INFO_JSON"]); expected=os.environ["EXPECTED_BUILD_ID"].strip(); release_gate=payload.get("releaseGate") or {}; repair_plan=payload.get("repairPlan") or {}; sys.exit(0 if ((payload.get("buildId") or "").strip()==expected and ((payload.get("controlPlanePersistence") or {}).get("exactRowsPresent")) is True and (payload.get("deployGate") or {}).get("verdict")=="pass" and release_gate.get("verdict")=="pass" and len(repair_plan.get("recommendations") or [])==0) else 1)'
              then
                cat current-build-info.json
                exit 0
              fi

              sleep 20
            done

            cat current-build-info.json
            exit 1
          EOF
