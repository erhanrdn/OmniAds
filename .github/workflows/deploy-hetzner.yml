name: Deploy to Hetzner

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:
    inputs:
      sha:
        description: Exact commit SHA to deploy or roll back to
        required: true
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.sha != '') ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Resolve deploy SHA
        id: deploy_sha
        shell: bash
        env:
          INPUT_SHA: ${{ inputs.sha }}
          WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            target_sha="${INPUT_SHA}"
          else
            target_sha="${WORKFLOW_RUN_SHA}"
          fi

          if [ -z "${target_sha}" ]; then
            echo "Deploy SHA is required."
            exit 1
          fi

          case "${target_sha}" in
            *[!0-9a-fA-F]*)
              echo "Deploy SHA must be hexadecimal."
              exit 1
              ;;
          esac

          if [ "${#target_sha}" -ne 40 ]; then
            echo "Deploy SHA must be the full 40-character commit SHA."
            exit 1
          fi

          echo "sha=${target_sha}" >> "$GITHUB_OUTPUT"

      - name: Skip superseded workflow-run deploys
        id: freshness
        if: github.event_name == 'workflow_run'
        shell: bash
        env:
          DEPLOY_SHA: ${{ steps.deploy_sha.outputs.sha }}
          REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          current_main_sha="$(
            git ls-remote "https://x-access-token:${GH_TOKEN}@github.com/${REPOSITORY}.git" refs/heads/main \
              | awk '{print $1}'
          )"

          if [ -z "${current_main_sha}" ]; then
            echo "Unable to resolve current main HEAD."
            exit 1
          fi

          echo "current_main_sha=${current_main_sha}" >> "$GITHUB_OUTPUT"

          if [ "${DEPLOY_SHA}" != "${current_main_sha}" ]; then
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "Skipping superseded deploy for ${DEPLOY_SHA}; current main is ${current_main_sha}."
            exit 0
          fi

          echo "should_deploy=true" >> "$GITHUB_OUTPUT"

      - name: Checkout deploy ref
        if: github.event_name != 'workflow_run' || steps.freshness.outputs.should_deploy == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.deploy_sha.outputs.sha }}
          fetch-depth: 1

      - name: Deploy over SSH
        if: github.event_name != 'workflow_run' || steps.freshness.outputs.should_deploy == 'true'
        env:
          DEPLOY_SHA: ${{ steps.deploy_sha.outputs.sha }}
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
          HETZNER_PORT: ${{ secrets.HETZNER_PORT }}
          HETZNER_KNOWN_HOSTS: ${{ secrets.HETZNER_KNOWN_HOSTS }}
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${HETZNER_HOST}" ] || [ -z "${HETZNER_USER}" ] || [ -z "${HETZNER_SSH_KEY}" ] || [ -z "${HETZNER_KNOWN_HOSTS}" ]; then
            echo "Missing required Hetzner deploy secrets."
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "${HETZNER_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          printf '%s\n' "${HETZNER_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

          PORT="${HETZNER_PORT:-22}"
          SSH_OPTS=(
            -i ~/.ssh/id_ed25519
            -p "${PORT}"
            -o BatchMode=yes
            -o ServerAliveInterval=30
            -o ServerAliveCountMax=6
            -o TCPKeepAlive=yes
          )
          REMOTE_APP_DIR="/var/www/adsecute"

          ssh "${SSH_OPTS[@]}" "${HETZNER_USER}@${HETZNER_HOST}" \
            "mkdir -p '${REMOTE_APP_DIR}' && cat > '${REMOTE_APP_DIR}/docker-compose.yml.tmp'" \
            < docker-compose.yml

          ssh "${SSH_OPTS[@]}" "${HETZNER_USER}@${HETZNER_HOST}" \
            "mv '${REMOTE_APP_DIR}/docker-compose.yml.tmp' '${REMOTE_APP_DIR}/docker-compose.yml'"

          ssh "${SSH_OPTS[@]}" "${HETZNER_USER}@${HETZNER_HOST}" \
            "DEPLOY_SHA='${DEPLOY_SHA}' bash -seuo pipefail" <<'EOF'
            cd /var/www/adsecute

            log() {
              printf '\n[%s] %s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "$1"
            }

            wait_for_build_info() {
              attempts="$1"
              sleep_seconds="$2"
              attempt=1

              while [ "$attempt" -le "$attempts" ]; do
                if build_info_json="$(curl -fsS http://127.0.0.1:3000/api/build-info 2>/dev/null)"; then
                  printf '%s\n' "${build_info_json}"
                  return 0
                fi

                sleep "${sleep_seconds}"
                attempt=$((attempt + 1))
              done

              return 1
            }

            check_optional_health() {
              service_name="$1"
              container_id="$(docker compose ps -q "${service_name}" || true)"

              if [ -z "${container_id}" ]; then
                echo "Missing container for service ${service_name}"
                return 1
              fi

              has_healthcheck="$(docker inspect "${container_id}" --format '{{if .Config.Healthcheck}}yes{{else}}no{{end}}')"
              if [ "${has_healthcheck}" != "yes" ]; then
                return 0
              fi

              attempt=1
              while [ "$attempt" -le 20 ]; do
                health_status="$(docker inspect "${container_id}" --format '{{.State.Health.Status}}')"
                echo "${service_name}_health_status=${health_status} attempt=${attempt}/20"
                if [ "${health_status}" = "healthy" ]; then
                  return 0
                fi

                sleep 3
                attempt=$((attempt + 1))
              done

              docker inspect "${container_id}" --format '{{json .State.Health}}' || true
              docker logs --tail=120 "${container_id}" || true
              return 1
            }

            export APP_IMAGE_TAG="${DEPLOY_SHA}"
            export APP_BUILD_ID="${DEPLOY_SHA}"

            log "Pulling exact SHA images"
            docker compose pull web worker migrate

            log "Running migrations for ${DEPLOY_SHA}"
            docker compose run --rm --no-deps migrate

            log "Recreating web and worker"
            docker compose up -d --force-recreate web worker

            log "Checking running services"
            docker compose ps

            log "Checking runtime build info"
            BUILD_INFO_JSON="$(wait_for_build_info 20 3)"
            BUILD_ID="$(printf '%s' "${BUILD_INFO_JSON}" | node -e "let data='';process.stdin.on('data',chunk=>data+=chunk);process.stdin.on('end',()=>{const parsed=JSON.parse(data);process.stdout.write(parsed.buildId || '');});")"
            echo "DEPLOY_SHA=${DEPLOY_SHA}"
            echo "BUILD_ID=${BUILD_ID}"
            test -n "${BUILD_ID}"
            test "${BUILD_ID}" = "${DEPLOY_SHA}"

            log "Checking optional container health"
            check_optional_health web
            check_optional_health worker
          EOF

      - name: Verify public build info
        if: github.event_name != 'workflow_run' || steps.freshness.outputs.should_deploy == 'true'
        env:
          DEPLOY_SHA: ${{ steps.deploy_sha.outputs.sha }}
        shell: bash
        run: |
          set -euo pipefail

          wait_for_expected_build_id() {
            url="$1"
            attempts="$2"
            sleep_seconds="$3"
            attempt=1

            while [ "$attempt" -le "$attempts" ]; do
              if build_info_json="$(curl -fsSL "$url" 2>/dev/null)"; then
                build_id="$(
                  printf '%s' "${build_info_json}" | node -e "let data='';process.stdin.on('data',chunk=>data+=chunk);process.stdin.on('end',()=>{const parsed=JSON.parse(data);process.stdout.write(parsed.buildId || '');});"
                )"
                echo "url=${url} build_id=${build_id} attempt=${attempt}/${attempts}"
                if [ -n "${build_id}" ] && [ "${build_id}" = "${DEPLOY_SHA}" ]; then
                  return 0
                fi
              fi

              sleep "${sleep_seconds}"
              attempt=$((attempt + 1))
            done

            echo "Public build info verification failed for ${url}; expected ${DEPLOY_SHA}."
            return 1
          }

          wait_for_expected_build_id "https://adsecute.com/api/build-info" 20 5
          wait_for_expected_build_id "https://www.adsecute.com/api/build-info" 20 5
