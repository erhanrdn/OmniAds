name: Deploy to Hetzner

on:
  workflow_dispatch:
    inputs:
      sha:
        description: Exact commit SHA to deploy or roll back to
        required: true
        type: string
      require_current_main_head:
        description: Skip this deploy if the SHA is not the current main HEAD
        required: false
        default: "false"
        type: string
      run_migrations:
        description: Run deploy-time database migrations
        required: false
        default: "true"
        type: string
      break_glass:
        description: Allow manual break-glass deploy without enforcing the synthetic deploy gate
        required: false
        default: "false"
        type: string
      override_reason:
        description: Required reason when break_glass is true
        required: false
        default: ""
        type: string

concurrency:
  group: deploy-production-main
  cancel-in-progress: false

jobs:
  deploy:
    if: inputs.sha != ''
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Resolve deploy SHA
        id: deploy_sha
        shell: bash
        env:
          INPUT_SHA: ${{ inputs.sha }}
        run: |
          set -euo pipefail

          target_sha="${INPUT_SHA}"

          if [ -z "${target_sha}" ]; then
            echo "Deploy SHA is required."
            exit 1
          fi

          case "${target_sha}" in
            *[!0-9a-fA-F]*)
              echo "Deploy SHA must be hexadecimal."
              exit 1
              ;;
          esac

          if [ "${#target_sha}" -ne 40 ]; then
            echo "Deploy SHA must be the full 40-character commit SHA."
            exit 1
          fi

          echo "sha=${target_sha}" >> "$GITHUB_OUTPUT"

      - name: Skip superseded deploys
        id: freshness
        if: inputs.require_current_main_head == 'true'
        shell: bash
        env:
          DEPLOY_SHA: ${{ steps.deploy_sha.outputs.sha }}
          REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          current_main_sha="$(
            git ls-remote "https://x-access-token:${GH_TOKEN}@github.com/${REPOSITORY}.git" refs/heads/main \
              | awk '{print $1}'
          )"

          if [ -z "${current_main_sha}" ]; then
            echo "Unable to resolve current main HEAD."
            exit 1
          fi

          echo "current_main_sha=${current_main_sha}" >> "$GITHUB_OUTPUT"

          if [ "${DEPLOY_SHA}" != "${current_main_sha}" ]; then
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "Skipping superseded deploy for ${DEPLOY_SHA}; current main is ${current_main_sha}."
            exit 0
          fi

          echo "should_deploy=true" >> "$GITHUB_OUTPUT"

      - name: Checkout deploy ref
        if: inputs.require_current_main_head != 'true' || steps.freshness.outputs.should_deploy == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.deploy_sha.outputs.sha }}
          fetch-depth: 1

      - name: Prepare SSH access
        if: inputs.require_current_main_head != 'true' || steps.freshness.outputs.should_deploy == 'true'
        shell: bash
        env:
          BREAK_GLASS: ${{ inputs.break_glass }}
          OVERRIDE_REASON: ${{ inputs.override_reason }}
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
          HETZNER_PORT: ${{ secrets.HETZNER_PORT }}
          HETZNER_KNOWN_HOSTS: ${{ secrets.HETZNER_KNOWN_HOSTS }}
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
        run: |
          set -euo pipefail

          if [ "${BREAK_GLASS}" = "true" ] && [ -z "${OVERRIDE_REASON}" ]; then
            echo "override_reason is required when break_glass=true"
            exit 1
          fi

          if [ -z "${HETZNER_USER}" ] || [ -z "${HETZNER_SSH_KEY}" ] || [ -z "${HETZNER_KNOWN_HOSTS}" ]; then
            echo "Missing required Hetzner deploy secrets."
            exit 1
          fi

          source .github/scripts/hetzner-ssh.sh

          primary_deploy_host="${HETZNER_HOST}"
          public_deploy_host="$(resolve_host "adsecute.com")"
          primary_deploy_host_ip="$(resolve_host "${primary_deploy_host}")"
          public_deploy_host_ip="$(resolve_host "${public_deploy_host}")"

          if [ -z "${primary_deploy_host}" ]; then
            primary_deploy_host="${public_deploy_host}"
            primary_deploy_host_ip="${public_deploy_host_ip}"
          fi

          if [ -z "${primary_deploy_host}" ]; then
            echo "No deploy target host resolved."
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "${HETZNER_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          printf '%s\n' "${HETZNER_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          ssh-keyscan -H "${primary_deploy_host}" 2>/dev/null >> ~/.ssh/known_hosts || true
          if [ -n "${public_deploy_host}" ]; then
            ssh-keyscan -H "${public_deploy_host}" 2>/dev/null >> ~/.ssh/known_hosts || true
          fi
          if [ -n "${public_deploy_host_ip}" ]; then
            ssh-keyscan -H "${public_deploy_host_ip}" 2>/dev/null >> ~/.ssh/known_hosts || true
          fi
          chmod 644 ~/.ssh/known_hosts

          {
            echo "PRIMARY_DEPLOY_HOST=${primary_deploy_host}"
            echo "PRIMARY_DEPLOY_HOST_IP=${primary_deploy_host_ip}"
            echo "PUBLIC_DEPLOY_HOST=${public_deploy_host}"
            echo "PUBLIC_DEPLOY_HOST_IP=${public_deploy_host_ip}"
            echo "REMOTE_APP_DIR=/var/www/adsecute"
          } >> "$GITHUB_ENV"

          echo "primary_deploy_host=${primary_deploy_host} primary_deploy_host_ip=${primary_deploy_host_ip}"
          echo "public_deploy_host=${public_deploy_host} public_deploy_host_ip=${public_deploy_host_ip}"

      - name: Sync deploy compose
        if: inputs.require_current_main_head != 'true' || steps.freshness.outputs.should_deploy == 'true'
        shell: bash
        env:
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
          HETZNER_PORT: ${{ secrets.HETZNER_PORT }}
        run: |
          set -euo pipefail
          source .github/scripts/hetzner-ssh.sh
          run_for_each_deploy_host sync_compose_to_host

      - name: Prepare runtime images
        if: inputs.require_current_main_head != 'true' || steps.freshness.outputs.should_deploy == 'true'
        shell: bash
        env:
          DEPLOY_SHA: ${{ steps.deploy_sha.outputs.sha }}
          BREAK_GLASS: ${{ inputs.break_glass }}
          OVERRIDE_REASON: ${{ inputs.override_reason }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
          HETZNER_PORT: ${{ secrets.HETZNER_PORT }}
        run: |
          set -euo pipefail
          source .github/scripts/hetzner-ssh.sh
          run_for_each_deploy_host run_remote_phase_on_host prepare_runtime

      - name: Run database migrations
        if: >-
          (inputs.require_current_main_head != 'true' || steps.freshness.outputs.should_deploy == 'true') &&
          inputs.run_migrations == 'true'
        shell: bash
        env:
          DEPLOY_SHA: ${{ steps.deploy_sha.outputs.sha }}
          BREAK_GLASS: ${{ inputs.break_glass }}
          OVERRIDE_REASON: ${{ inputs.override_reason }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
          HETZNER_PORT: ${{ secrets.HETZNER_PORT }}
        run: |
          set -euo pipefail
          source .github/scripts/hetzner-ssh.sh
          run_for_each_deploy_host run_remote_phase_on_host run_migrations

      - name: Recreate web and worker
        if: inputs.require_current_main_head != 'true' || steps.freshness.outputs.should_deploy == 'true'
        shell: bash
        env:
          DEPLOY_SHA: ${{ steps.deploy_sha.outputs.sha }}
          BREAK_GLASS: ${{ inputs.break_glass }}
          OVERRIDE_REASON: ${{ inputs.override_reason }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
          HETZNER_PORT: ${{ secrets.HETZNER_PORT }}
        run: |
          set -euo pipefail
          source .github/scripts/hetzner-ssh.sh
          run_for_each_deploy_host run_remote_phase_on_host recreate_services

      - name: Verify local runtime readiness
        if: inputs.require_current_main_head != 'true' || steps.freshness.outputs.should_deploy == 'true'
        shell: bash
        env:
          DEPLOY_SHA: ${{ steps.deploy_sha.outputs.sha }}
          BREAK_GLASS: ${{ inputs.break_glass }}
          OVERRIDE_REASON: ${{ inputs.override_reason }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
          HETZNER_PORT: ${{ secrets.HETZNER_PORT }}
        run: |
          set -euo pipefail
          source .github/scripts/hetzner-ssh.sh
          run_for_each_deploy_host run_remote_phase_on_host verify_runtime

      - name: Persist current-build sync control plane
        if: inputs.require_current_main_head != 'true' || steps.freshness.outputs.should_deploy == 'true'
        shell: bash
        env:
          DEPLOY_SHA: ${{ steps.deploy_sha.outputs.sha }}
          BREAK_GLASS: ${{ inputs.break_glass }}
          OVERRIDE_REASON: ${{ inputs.override_reason }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
          HETZNER_PORT: ${{ secrets.HETZNER_PORT }}
        run: |
          set -euo pipefail

          source .github/scripts/hetzner-ssh.sh
          run_for_each_deploy_host run_remote_phase_on_host persist_control_plane

      - name: Verify public build propagation
        if: inputs.require_current_main_head != 'true' || steps.freshness.outputs.should_deploy == 'true'
        env:
          DEPLOY_SHA: ${{ steps.deploy_sha.outputs.sha }}
        shell: bash
        run: |
          set -euo pipefail

          urls=(
            "https://adsecute.com/api/build-info"
            "https://www.adsecute.com/api/build-info"
          )
          attempts=24
          sleep_seconds=5
          attempt=1

          while [ "${attempt}" -le "${attempts}" ]; do
            pending=0

            for url in "${urls[@]}"; do
              if build_info_json="$(curl -fsSL "${url}" 2>/dev/null)"; then
                build_id="$(
                  printf '%s' "${build_info_json}" | python3 -c 'import json, sys; print((json.load(sys.stdin).get("buildId") or ""), end="")'
                )"
                echo "url=${url} build_id=${build_id:-unknown} attempt=${attempt}/${attempts}"
                if [ -z "${build_id}" ] || [ "${build_id}" != "${DEPLOY_SHA}" ]; then
                  pending=1
                fi
              else
                echo "url=${url} build_info_fetch_failed attempt=${attempt}/${attempts}"
                pending=1
              fi
            done

            if [ "${pending}" -eq 0 ]; then
              exit 0
            fi

            if [ "${attempt}" -lt "${attempts}" ]; then
              sleep "${sleep_seconds}"
            fi
            attempt=$((attempt + 1))
          done

          echo "Public build info did not converge to ${DEPLOY_SHA} across all ingress URLs."
          exit 1

      - name: Smoke test public ingress
        if: inputs.require_current_main_head != 'true' || steps.freshness.outputs.should_deploy == 'true'
        shell: bash
        run: |
          set -euo pipefail

          curl -fsSI https://adsecute.com/about >/dev/null
          curl -fsSI https://www.adsecute.com/about >/dev/null

      - name: Dispatch post-deploy verification workflow
        if: inputs.require_current_main_head != 'true' || steps.freshness.outputs.should_deploy == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          DEPLOY_SHA: ${{ steps.deploy_sha.outputs.sha }}
        run: |
          set -euo pipefail

          curl -fsSL \
            -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPOSITORY}/actions/workflows/post-deploy-verify.yml/dispatches" \
            -d @- <<EOF
          {
            "ref": "main",
            "inputs": {
              "sha": "${DEPLOY_SHA}"
            }
          }
          EOF
