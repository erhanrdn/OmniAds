name: Deploy to Hetzner

on:
  workflow_dispatch:
    inputs:
      sha:
        description: Exact commit SHA to deploy or roll back to
        required: true
        type: string
      require_current_main_head:
        description: Skip this deploy if the SHA is not the current main HEAD
        required: false
        default: "false"
        type: string
      break_glass:
        description: Allow manual break-glass deploy without enforcing the synthetic deploy gate
        required: false
        default: "false"
        type: string
      override_reason:
        description: Required reason when break_glass is true
        required: false
        default: ""
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    if: inputs.sha != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Resolve deploy SHA
        id: deploy_sha
        shell: bash
        env:
          INPUT_SHA: ${{ inputs.sha }}
        run: |
          set -euo pipefail

          target_sha="${INPUT_SHA}"

          if [ -z "${target_sha}" ]; then
            echo "Deploy SHA is required."
            exit 1
          fi

          case "${target_sha}" in
            *[!0-9a-fA-F]*)
              echo "Deploy SHA must be hexadecimal."
              exit 1
              ;;
          esac

          if [ "${#target_sha}" -ne 40 ]; then
            echo "Deploy SHA must be the full 40-character commit SHA."
            exit 1
          fi

          echo "sha=${target_sha}" >> "$GITHUB_OUTPUT"

      - name: Skip superseded deploys
        id: freshness
        if: inputs.require_current_main_head == 'true'
        shell: bash
        env:
          DEPLOY_SHA: ${{ steps.deploy_sha.outputs.sha }}
          REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          current_main_sha="$(
            git ls-remote "https://x-access-token:${GH_TOKEN}@github.com/${REPOSITORY}.git" refs/heads/main \
              | awk '{print $1}'
          )"

          if [ -z "${current_main_sha}" ]; then
            echo "Unable to resolve current main HEAD."
            exit 1
          fi

          echo "current_main_sha=${current_main_sha}" >> "$GITHUB_OUTPUT"

          if [ "${DEPLOY_SHA}" != "${current_main_sha}" ]; then
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "Skipping superseded deploy for ${DEPLOY_SHA}; current main is ${current_main_sha}."
            exit 0
          fi

          echo "should_deploy=true" >> "$GITHUB_OUTPUT"

      - name: Checkout deploy ref
        if: inputs.require_current_main_head != 'true' || steps.freshness.outputs.should_deploy == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.deploy_sha.outputs.sha }}
          fetch-depth: 1

      - name: Deploy over SSH
        if: inputs.require_current_main_head != 'true' || steps.freshness.outputs.should_deploy == 'true'
        env:
          DEPLOY_SHA: ${{ steps.deploy_sha.outputs.sha }}
          BREAK_GLASS: ${{ inputs.break_glass }}
          OVERRIDE_REASON: ${{ inputs.override_reason }}
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
          HETZNER_PORT: ${{ secrets.HETZNER_PORT }}
          HETZNER_KNOWN_HOSTS: ${{ secrets.HETZNER_KNOWN_HOSTS }}
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
        shell: bash
        run: |
          set -euo pipefail

          if [ "${BREAK_GLASS}" = "true" ] && [ -z "${OVERRIDE_REASON}" ]; then
            echo "override_reason is required when break_glass=true"
            exit 1
          fi

          if [ -z "${HETZNER_USER}" ] || [ -z "${HETZNER_SSH_KEY}" ] || [ -z "${HETZNER_KNOWN_HOSTS}" ]; then
            echo "Missing required Hetzner deploy secrets."
            exit 1
          fi

          resolve_host() {
            host="$1"
            if [ -z "${host}" ]; then
              return 0
            fi
            python3 -c 'import socket, sys; print(socket.gethostbyname(sys.argv[1]))' "${host}" 2>/dev/null || printf '%s\n' "${host}"
          }

          PRIMARY_DEPLOY_HOST="${HETZNER_HOST}"
          PUBLIC_DEPLOY_HOST="$(resolve_host "adsecute.com")"
          PRIMARY_DEPLOY_HOST_IP="$(resolve_host "${PRIMARY_DEPLOY_HOST}")"
          PUBLIC_DEPLOY_HOST_IP="$(resolve_host "${PUBLIC_DEPLOY_HOST}")"

          if [ -z "${PRIMARY_DEPLOY_HOST}" ]; then
            PRIMARY_DEPLOY_HOST="${PUBLIC_DEPLOY_HOST}"
            PRIMARY_DEPLOY_HOST_IP="${PUBLIC_DEPLOY_HOST_IP}"
          fi

          if [ -z "${PRIMARY_DEPLOY_HOST}" ]; then
            echo "No deploy target host resolved."
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "${HETZNER_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          printf '%s\n' "${HETZNER_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          if [ -n "${PRIMARY_DEPLOY_HOST}" ]; then
            ssh-keyscan -H "${PRIMARY_DEPLOY_HOST}" 2>/dev/null >> ~/.ssh/known_hosts || true
          fi
          if [ -n "${PUBLIC_DEPLOY_HOST}" ]; then
            ssh-keyscan -H "${PUBLIC_DEPLOY_HOST}" 2>/dev/null >> ~/.ssh/known_hosts || true
          fi
          if [ -n "${PUBLIC_DEPLOY_HOST_IP}" ]; then
            ssh-keyscan -H "${PUBLIC_DEPLOY_HOST_IP}" 2>/dev/null >> ~/.ssh/known_hosts || true
          fi
          chmod 644 ~/.ssh/known_hosts

          PORT="${HETZNER_PORT:-22}"
          SSH_OPTS=(
            -i ~/.ssh/id_ed25519
            -p "${PORT}"
            -o BatchMode=yes
            -o ServerAliveInterval=30
            -o ServerAliveCountMax=6
            -o TCPKeepAlive=yes
          )
          REMOTE_APP_DIR="/var/www/adsecute"

          deploy_target() {
            target_host="$1"
            target_label="$2"

            echo "Deploying ${DEPLOY_SHA} to ${target_label} (${target_host})"

            ssh "${SSH_OPTS[@]}" "${HETZNER_USER}@${target_host}" \
              "mkdir -p '${REMOTE_APP_DIR}' && cat > '${REMOTE_APP_DIR}/docker-compose.yml.tmp'" \
              < docker-compose.yml

            ssh "${SSH_OPTS[@]}" "${HETZNER_USER}@${target_host}" \
              "mv '${REMOTE_APP_DIR}/docker-compose.yml.tmp' '${REMOTE_APP_DIR}/docker-compose.yml'"

            ssh "${SSH_OPTS[@]}" "${HETZNER_USER}@${target_host}" \
              "DEPLOY_SHA='${DEPLOY_SHA}' BREAK_GLASS='${BREAK_GLASS}' OVERRIDE_REASON='${OVERRIDE_REASON}' bash -seuo pipefail" <<'EOF'
              cd /var/www/adsecute

              log() {
                printf '\n[%s] %s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "$1"
              }

              dump_service_diagnostics() {
                log "Collecting deploy diagnostics"
                docker compose ps || true
                docker compose ps migrate || true
                docker compose logs --tail=120 migrate || true

                for service_name in web worker; do
                  container_id="$(docker compose ps -q "${service_name}" || true)"
                  if [ -z "${container_id}" ]; then
                    echo "Missing container for service ${service_name}"
                    continue
                  fi

                  echo "--- ${service_name} inspect"
                  docker inspect "${container_id}" --format '{{json .Config.Image}} {{json .State}}' || true
                  echo "--- ${service_name} logs"
                  docker logs --tail=120 "${container_id}" || true
                done
              }

              on_deploy_error() {
                status="$?"
                dump_service_diagnostics
                exit "${status}"
              }

              trap on_deploy_error ERR

              wait_for_build_info() {
                attempts="$1"
                sleep_seconds="$2"
                attempt=1

                while [ "$attempt" -le "$attempts" ]; do
                  if build_info_json="$(curl -fsS http://127.0.0.1:3000/api/build-info 2>/dev/null)"; then
                    printf '%s\n' "${build_info_json}"
                    return 0
                  fi

                  sleep "${sleep_seconds}"
                  attempt=$((attempt + 1))
                done

                return 1
              }

              extract_build_id() {
                python3 -c 'import json, sys; print((json.load(sys.stdin).get("buildId") or ""), end="")'
              }

              current_utc_iso() {
                date -u +%Y-%m-%dT%H:%M:%SZ
              }

              check_optional_health() {
                service_name="$1"
                max_attempts="${2:-40}"
                container_id="$(docker compose ps -q "${service_name}" || true)"

                if [ -z "${container_id}" ]; then
                  echo "Missing container for service ${service_name}"
                  return 1
                fi

                has_healthcheck="$(docker inspect "${container_id}" --format '{{if .Config.Healthcheck}}yes{{else}}no{{end}}')"
                if [ "${has_healthcheck}" != "yes" ]; then
                  return 0
                fi

                attempt=1
                while [ "$attempt" -le "${max_attempts}" ]; do
                  health_status="$(docker inspect "${container_id}" --format '{{.State.Health.Status}}')"
                  echo "${service_name}_health_status=${health_status} attempt=${attempt}/${max_attempts}"
                  if [ "${health_status}" = "healthy" ]; then
                    return 0
                  fi

                  sleep 3
                  attempt=$((attempt + 1))
                done

                docker inspect "${container_id}" --format '{{json .State.Health}}' || true
                docker logs --tail=120 "${container_id}" || true
                return 1
              }

              verify_worker_fresh_heartbeat_after() {
                min_heartbeat_after="$1"
                max_attempts="${2:-12}"
                sleep_seconds="${3:-5}"
                attempt=1

                while [ "$attempt" -le "${max_attempts}" ]; do
                  echo "worker_fresh_heartbeat_check min_after=${min_heartbeat_after} attempt=${attempt}/${max_attempts}"
                  if docker compose exec -T worker \
                    node --import tsx scripts/sync-worker-healthcheck.ts \
                      --provider-scope meta \
                      --online-window-minutes 5 \
                      --min-online-workers 1 \
                      --min-heartbeat-after "${min_heartbeat_after}"; then
                    return 0
                  fi

                  sleep "${sleep_seconds}"
                  attempt=$((attempt + 1))
                done

                docker compose ps worker || true
                worker_container_id="$(docker compose ps -q worker || true)"
                if [ -n "${worker_container_id}" ]; then
                  docker inspect "${worker_container_id}" --format '{{json .State.Health}}' || true
                  docker logs --tail=120 "${worker_container_id}" || true
                fi

                return 1
              }

              persist_sync_control_plane_via_web() {
                cron_secret="$(docker compose exec -T web node -e 'process.stdout.write(process.env.CRON_SECRET || \"\")')"
                if [ -z "${cron_secret}" ]; then
                  echo "CRON_SECRET is missing from the web runtime."
                  return 1
                fi

                query_string="controlPlaneOnly=1&buildId=${DEPLOY_SHA}&enforceDeployGate=1"
                if [ "${BREAK_GLASS}" = "true" ]; then
                  encoded_override_reason="$(
                    python3 -c 'import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1]))' "${OVERRIDE_REASON}"
                  )"
                  query_string="${query_string}&breakGlass=1&overrideReason=${encoded_override_reason}"
                fi

                response_file="$(mktemp)"
                http_status="$(
                  curl -sS -o "${response_file}" -w '%{http_code}' -X POST \
                    "http://127.0.0.1:3000/api/sync/cron?${query_string}" \
                    -H "Authorization: Bearer ${cron_secret}"
                )"
                response_json="$(cat "${response_file}")"
                rm -f "${response_file}"
                printf '%s\n' "${response_json}"

                route_status=0
                RESPONSE_JSON="${response_json}" HTTP_STATUS="${http_status}" python3 -c 'import json, os, sys; status=int(os.environ["HTTP_STATUS"]); payload=json.loads(os.environ["RESPONSE_JSON"] or "{}"); sys.exit(10 if status not in (200, 503) else 20 if status == 503 else 30 if payload.get("ok") is not True else 0)' || route_status=$?
                if [ "${route_status}" -ne 0 ]; then
                  case "${route_status}" in
                    10)
                      echo "controlPlaneOnly route returned unexpected HTTP status ${http_status}"
                      ;;
                    20)
                      echo "controlPlaneOnly route blocked deploy via enforced deployGate"
                      ;;
                    30)
                      echo "controlPlaneOnly route returned ok=false"
                      ;;
                    *)
                      echo "controlPlaneOnly route validation failed"
                      ;;
                  esac
                  return 1
                fi
              }

              verify_local_sync_control_plane() {
                attempt=1
                max_attempts=6
                sleep_seconds=5

                while [ "${attempt}" -le "${max_attempts}" ]; do
                  if docker compose exec -T -e NODE_ENV=production web \
                    node --import tsx scripts/sync-control-plane-verify.ts \
                      --build-id "${DEPLOY_SHA}" \
                      --environment production \
                      --provider-scope meta
                  then
                    echo "local_control_plane_ready=yes attempt=${attempt}/${max_attempts}"
                    return 0
                  fi

                  echo "local_control_plane_ready=no attempt=${attempt}/${max_attempts}"
                  attempt=$((attempt + 1))
                  if [ "${attempt}" -le "${max_attempts}" ]; then
                    sleep "${sleep_seconds}"
                  fi
                done

                return 1
              }

              persist_sync_control_plane_directly() {
                gate_args=(
                  --build-id "${DEPLOY_SHA}"
                  --environment production
                )
                if [ "${BREAK_GLASS}" = "true" ]; then
                  gate_args+=(--break-glass --override-reason "${OVERRIDE_REASON}")
                fi

                docker compose exec -T -e NODE_ENV=production web \
                  node --import tsx scripts/sync-gate-evaluate.ts \
                    "${gate_args[@]}"

                docker compose exec -T -e NODE_ENV=production web \
                  node --import tsx scripts/sync-repair-plan-evaluate.ts \
                    --build-id "${DEPLOY_SHA}" \
                    --environment production \
                    --provider-scope meta
              }

              persist_sync_control_plane() {
                persist_sync_control_plane_via_web

                if verify_local_sync_control_plane; then
                  return 0
                fi

                echo "controlPlaneOnly route did not produce exact current-build rows; retrying with direct web-container writers"
                persist_sync_control_plane_directly
                verify_local_sync_control_plane
              }

              verify_service_image() {
                service_name="$1"
                expected_image="$2"
                container_id="$(docker compose ps -q "${service_name}" || true)"

                if [ -z "${container_id}" ]; then
                  echo "Missing container for service ${service_name}"
                  return 1
                fi

                actual_image="$(docker inspect "${container_id}" --format '{{.Config.Image}}')"
                echo "${service_name}_actual_image=${actual_image}"
                echo "${service_name}_expected_image=${expected_image}"
                test "${actual_image}" = "${expected_image}"
              }

              run_migrations_service() {
                migration_timeout_seconds="${DEPLOY_MIGRATION_TIMEOUT_SECONDS:-600}"
                docker compose rm -f migrate >/dev/null 2>&1 || true

                if command -v timeout >/dev/null 2>&1; then
                  set +e
                  timeout "${migration_timeout_seconds}" docker compose up --no-deps --abort-on-container-exit --exit-code-from migrate migrate
                  status="$?"
                  set -e
                else
                  set +e
                  docker compose up --no-deps --abort-on-container-exit --exit-code-from migrate migrate
                  status="$?"
                  set -e
                fi

                if [ "${status}" -ne 0 ]; then
                  docker compose ps migrate || true
                  docker compose logs --tail=200 migrate || true
                fi

                docker compose rm -f migrate >/dev/null 2>&1 || true
                return "${status}"
              }

              export APP_IMAGE_TAG="${DEPLOY_SHA}"
              export APP_BUILD_ID="${DEPLOY_SHA}"
              expected_web_image="ghcr.io/erhanrdn/omniads-web:${DEPLOY_SHA}"
              expected_worker_image="ghcr.io/erhanrdn/omniads-worker:${DEPLOY_SHA}"

              log "Pulling exact SHA images"
              docker compose pull web worker

              log "Running migrations for ${DEPLOY_SHA}"
              run_migrations_service

              log "Recreating web and worker"
              docker compose up -d --force-recreate web worker

              log "Checking running services"
              docker compose ps

              log "Verifying exact service images"
              verify_service_image web "${expected_web_image}"
              verify_service_image worker "${expected_worker_image}"

              log "Checking runtime build info"
              BUILD_INFO_JSON="$(wait_for_build_info 30 3)"
              BUILD_ID="$(printf '%s' "${BUILD_INFO_JSON}" | extract_build_id)"
              echo "DEPLOY_SHA=${DEPLOY_SHA}"
              echo "BUILD_ID=${BUILD_ID}"
              test -n "${BUILD_ID}"
              test "${BUILD_ID}" = "${DEPLOY_SHA}"

              log "Checking optional container health"
              check_optional_health web 20
              check_optional_health worker 40

              worker_healthy_at="$(current_utc_iso)"
              log "Verifying fresh Meta heartbeat after worker health"
              verify_worker_fresh_heartbeat_after "${worker_healthy_at}" 12 5

              log "Persisting current-build sync control plane"
              persist_sync_control_plane
              trap - ERR
          EOF
          }

          public_build_matches() {
            url="$1"
            attempts="$2"
            sleep_seconds="$3"
            attempt=1

            while [ "$attempt" -le "$attempts" ]; do
              if build_info_json="$(curl -fsSL "$url" 2>/dev/null)"; then
                build_id="$(
                  printf '%s' "${build_info_json}" | python3 -c 'import json, sys; print((json.load(sys.stdin).get("buildId") or ""), end="")'
                )"
                echo "url=${url} build_id=${build_id} attempt=${attempt}/${attempts}"
                if [ -n "${build_id}" ] && [ "${build_id}" = "${DEPLOY_SHA}" ]; then
                  return 0
                fi
              fi

              sleep "${sleep_seconds}"
              attempt=$((attempt + 1))
            done

            return 1
          }

          public_control_plane_matches() {
            url="$1"
            attempts="$2"
            sleep_seconds="$3"
            attempt=1

            while [ "$attempt" -le "$attempts" ]; do
              if build_info_json="$(curl -fsSL "$url" 2>/dev/null)"; then
                if BUILD_INFO_JSON="${build_info_json}" EXPECTED_BUILD="${DEPLOY_SHA}" python3 -c 'import json, os; payload=json.loads(os.environ["BUILD_INFO_JSON"]); expected=os.environ["EXPECTED_BUILD"]; deploy_gate=payload.get("deployGate") or {}; release_gate=payload.get("releaseGate") or {}; repair_plan=payload.get("repairPlan") or {}; raise SystemExit(0 if (payload.get("buildId") or "") == expected and deploy_gate.get("id") and release_gate.get("id") and repair_plan.get("id") else 1)'
                then
                  echo "url=${url} control_plane_ready=yes attempt=${attempt}/${attempts}"
                  return 0
                fi
                echo "url=${url} control_plane_ready=no attempt=${attempt}/${attempts}"
              fi

              sleep "${sleep_seconds}"
              attempt=$((attempt + 1))
            done

            return 1
          }

          require_public_build_match() {
            public_build_matches "https://adsecute.com/api/build-info" 12 5
            public_build_matches "https://www.adsecute.com/api/build-info" 12 5
            public_control_plane_matches "https://adsecute.com/api/build-info" 12 5
            public_control_plane_matches "https://www.adsecute.com/api/build-info" 12 5
          }

          remediate_primary_public_ingress() {
            target_host="$1"

            echo "Attempting nginx ingress remediation on ${target_host}"

            ssh "${SSH_OPTS[@]}" "${HETZNER_USER}@${target_host}" "bash -seuo pipefail" <<'EOF'
              if command -v sudo >/dev/null 2>&1 && [ "$(id -u)" -ne 0 ]; then
                SUDO="sudo"
              else
                SUDO=""
              fi

              candidates="$($SUDO grep -RIl 'server_name .*adsecute\.com' /etc/nginx/sites-enabled /etc/nginx/sites-available 2>/dev/null || true)"

              if [ -z "${candidates}" ]; then
                echo "No nginx config with adsecute.com server_name found."
                exit 1
              fi

              printf '%s\n' "${candidates}" | while IFS= read -r file; do
                [ -n "${file}" ] || continue
                if $SUDO grep -Eq 'proxy_pass\s+http://(127\.0\.0\.1|localhost):[0-9]+' "${file}"; then
                  echo "Normalizing proxy_pass in ${file}"
                  $SUDO cp "${file}" "${file}.bak-codex"
                  $SUDO perl -0pi -e 's#proxy_pass\s+http://(?:127\.0\.0\.1|localhost):\d+;#proxy_pass http://127.0.0.1:3000;#g' "${file}"
                fi
              done

              $SUDO nginx -t
              $SUDO systemctl reload nginx || $SUDO service nginx reload

              curl -fsSL https://adsecute.com/api/build-info
              curl -fsSL https://www.adsecute.com/api/build-info
          EOF
          }

          deploy_target "${PRIMARY_DEPLOY_HOST}" "primary"

          if ! require_public_build_match; then
            echo "Public build info does not match ${DEPLOY_SHA} after primary deploy."

            if [ -z "${PUBLIC_DEPLOY_HOST_IP}" ]; then
              echo "Unable to resolve public deploy host for remediation."
              exit 1
            fi

            if [ "${PUBLIC_DEPLOY_HOST_IP}" = "${PRIMARY_DEPLOY_HOST_IP}" ]; then
              remediate_primary_public_ingress "${PRIMARY_DEPLOY_HOST}"
              require_public_build_match
              exit 0
            fi

            deploy_target "${PUBLIC_DEPLOY_HOST_IP}" "public_fallback"
            require_public_build_match
          fi

      - name: Setup Node for release verifier
        if: inputs.require_current_main_head != 'true' || steps.freshness.outputs.should_deploy == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install verifier dependencies
        if: inputs.require_current_main_head != 'true' || steps.freshness.outputs.should_deploy == 'true'
        run: npm ci

      - name: Verify public release authority (report-only)
        if: inputs.require_current_main_head != 'true' || steps.freshness.outputs.should_deploy == 'true'
        continue-on-error: true
        run: |
          set -euo pipefail

          node --import tsx scripts/verify-release-authority.ts \
            --mode=post_deploy \
            --base-url=https://adsecute.com \
            --expected-build-id=${{ steps.deploy_sha.outputs.sha }}

      - name: Smoke test public ingress
        if: inputs.require_current_main_head != 'true' || steps.freshness.outputs.should_deploy == 'true'
        shell: bash
        run: |
          set -euo pipefail

          curl -fsSI https://adsecute.com/about >/dev/null
          curl -fsSI https://www.adsecute.com/about >/dev/null
