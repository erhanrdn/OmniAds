# Creative v2 hardening workflow: read-only safety gate; behavior unchanged.
# Public Raw verification marker: multiline LF formatting required.
name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: |
          npx tsc --noEmit

      - name: Verify release authority preflight
        run: >-
          node --import tsx scripts/verify-release-authority.ts --mode=preflight

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: |
          npm run test

      - name: Creative Decision OS v2 safety (PR-blocking)
        run: |
          npm run creative:v2:safety

  build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: |
          npm run build

  detect-runtime-changes:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      runtime_changed: ${{ steps.filter.outputs.runtime_changed }}
      schema_changed: ${{ steps.filter.outputs.schema_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect runtime-affecting changes
        id: filter
        shell: bash
        env:
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          runtime_changed="false"
          schema_changed="false"
          live_build_sha=""
          schema_regex_parts=(
            '^(lib/migrations(\..*)?\.ts'
            '|scripts/run-migrations\.ts'
            '|lib/db-schema-readiness\.ts'
            '|app/api/migrate/route\.ts)$'
          )
          schema_regex="$(printf '%s' "${schema_regex_parts[@]}")"

          resolve_live_build_sha() {
            local payload
            if ! payload="$(curl -fsSL https://adsecute.com/api/build-info 2>/dev/null)"; then
              return 1
            fi

            python3 - "${payload}" 2>/dev/null <<'PY' || return 1
          import json
          import re
          import sys

          payload = json.loads(sys.argv[1])
          build_id = str(payload.get("buildId") or "").strip()
          if re.fullmatch(r"[0-9a-fA-F]{40}", build_id):
              print(build_id, end="")
              raise SystemExit(0)
          raise SystemExit(1)
          PY
          }

          if [ -z "${BEFORE_SHA}" ] || [ "${BEFORE_SHA}" = "0000000000000000000000000000000000000000" ]; then
            runtime_changed="true"
            schema_changed="true"
            echo "No valid before SHA."
            echo "Defaulting to runtime_changed=true schema_changed=true."
          elif ! git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null; then
            runtime_changed="true"
            schema_changed="true"
            echo "Before SHA ${BEFORE_SHA} is not available locally."
            echo "Defaulting to runtime_changed=true schema_changed=true."
          else
            changed_files="$(git diff --name-only "${BEFORE_SHA}" "${CURRENT_SHA}")"
            printf 'Changed files:\n%s\n' "${changed_files}"

            runtime_regex_parts=(
              '^(\.github/workflows/|app/|components/|hooks/|lib/'
              '|providers/|public/|scripts/|src/|store/'
              '|Dockerfile$|docker-compose\.yml$|package\.json$|package-lock\.json$'
              '|next\.config\.ts$|next-env\.d\.ts$|postcss\.config\.mjs$'
              '|tsconfig\.json$|proxy\.ts$|proxy\.test\.ts$'
              '|middleware\.ts$|middleware\.test\.ts$)'
            )
            runtime_regex="$(printf '%s' "${runtime_regex_parts[@]}")"
            if printf '%s\n' "${changed_files}" | grep -Eq "${runtime_regex}"; then
              runtime_changed="true"
              echo "Runtime-affecting change detected."
            fi

            if printf '%s\n' "${changed_files}" | grep -Eq "${schema_regex}"; then
              schema_changed="true"
              echo "Schema-affecting change detected."
            fi
          fi

          if live_build_sha="$(resolve_live_build_sha)"; then
            echo "Live build SHA resolved from public build-info: ${live_build_sha}"
            if git cat-file -e "${live_build_sha}^{commit}" 2>/dev/null; then
              live_changed_files="$(git diff --name-only "${live_build_sha}" "${CURRENT_SHA}")"
              if printf '%s\n' "${live_changed_files}" | grep -Eq "${schema_regex}"; then
                schema_changed="true"
                echo "Schema-affecting change detected between:"
                echo "live build ${live_build_sha}"
                echo "current build ${CURRENT_SHA}"
              fi
            else
              echo "Live build SHA ${live_build_sha} is not available locally."
              echo "Preserving current schema_changed=${schema_changed}."
            fi
          else
            echo "Unable to resolve live build SHA from public build-info."
            echo "Preserving current schema_changed=${schema_changed}."
          fi

          echo "runtime_changed=${runtime_changed}" >> "$GITHUB_OUTPUT"
          echo "schema_changed=${schema_changed}" >> "$GITHUB_OUTPUT"

  publish-web-image:
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.detect-runtime-changes.outputs.runtime_changed == 'true'
    needs:
      - typecheck
      - test
      - detect-runtime-changes
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    env:
      WEB_IMAGE: ghcr.io/erhanrdn/omniads-web
      BUILD_CACHE_SCOPE: app-image-build-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: web-runner
          push: true
          provenance: false
          build-args: |
            APP_BUILD_ID=${{ github.sha }}
          tags: |
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ env.BUILD_CACHE_SCOPE }}
          cache-to: type=gha,mode=max,scope=${{ env.BUILD_CACHE_SCOPE }}

  publish-worker-image:
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.detect-runtime-changes.outputs.runtime_changed == 'true'
    needs:
      - typecheck
      - test
      - detect-runtime-changes
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    env:
      WORKER_IMAGE: ghcr.io/erhanrdn/omniads-worker
      BUILD_CACHE_SCOPE: app-image-build-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: worker-runner
          push: true
          provenance: false
          build-args: |
            APP_BUILD_ID=${{ github.sha }}
          tags: |
            ${{ env.WORKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ env.BUILD_CACHE_SCOPE }}
          cache-to: type=gha,mode=max,scope=${{ env.BUILD_CACHE_SCOPE }}

  dispatch-deploy:
    if: >-
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.detect-runtime-changes.outputs.runtime_changed == 'true' &&
      needs.publish-web-image.result == 'success' &&
      needs.publish-worker-image.result == 'success'
    needs:
      - publish-web-image
      - publish-worker-image
      - detect-runtime-changes
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Dispatch deploy workflow
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          DEPLOY_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          curl -fsSL \
            -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPOSITORY}/actions/workflows/deploy-hetzner.yml/dispatches" \
            -d @- <<EOF
          {
            "ref": "main",
            "inputs": {
              "sha": "${DEPLOY_SHA}",
              "require_current_main_head": "true",
              "run_migrations": "${{ needs.detect-runtime-changes.outputs.schema_changed }}"
            }
          }
          EOF

  skip-runtime-deploy:
    if: >-
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.detect-runtime-changes.outputs.runtime_changed != 'true'
    needs:
      - typecheck
      - test
      - detect-runtime-changes
    runs-on: ubuntu-latest
    steps:
      - name: Explain deploy skip
        shell: bash
        run: |
          echo "No runtime-affecting files changed."
          echo "Image publish and deploy were intentionally skipped."
