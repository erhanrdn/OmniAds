name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm run test

  publish-images:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - build-test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    env:
      WEB_IMAGE: ghcr.io/erhanrdn/omniads-web
      WORKER_IMAGE: ghcr.io/erhanrdn/omniads-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: web-runner
          push: true
          provenance: false
          build-args: |
            APP_BUILD_ID=${{ github.sha }}
          tags: |
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=web-image
          cache-to: type=gha,mode=max,scope=web-image

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: worker-runner
          push: true
          provenance: false
          build-args: |
            APP_BUILD_ID=${{ github.sha }}
          tags: |
            ${{ env.WORKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=worker-image
          cache-to: type=gha,mode=max,scope=worker-image
