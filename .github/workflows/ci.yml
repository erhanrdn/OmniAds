name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        if: github.event_name == 'pull_request'
        run: npm run build

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm run test

  detect-runtime-changes:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      runtime_changed: ${{ steps.filter.outputs.runtime_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect runtime-affecting changes
        id: filter
        shell: bash
        env:
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [ -z "${BEFORE_SHA}" ] || [ "${BEFORE_SHA}" = "0000000000000000000000000000000000000000" ]; then
            echo "runtime_changed=true" >> "$GITHUB_OUTPUT"
            echo "No valid before SHA; defaulting to runtime_changed=true."
            exit 0
          fi

          if ! git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null; then
            echo "runtime_changed=true" >> "$GITHUB_OUTPUT"
            echo "Before SHA ${BEFORE_SHA} is not available locally; defaulting to runtime_changed=true."
            exit 0
          fi

          changed_files="$(git diff --name-only "${BEFORE_SHA}" "${CURRENT_SHA}")"
          printf 'Changed files:\n%s\n' "${changed_files}"

          if printf '%s\n' "${changed_files}" | grep -Eq '^(\.github/workflows/|app/|components/|hooks/|lib/|providers/|public/|scripts/|src/|store/|Dockerfile$|docker-compose\.yml$|package\.json$|package-lock\.json$|next\.config\.ts$|next-env\.d\.ts$|postcss\.config\.mjs$|tsconfig\.json$|proxy\.ts$|proxy\.test\.ts$|middleware\.ts$|middleware\.test\.ts$)'; then
            echo "runtime_changed=true" >> "$GITHUB_OUTPUT"
            echo "Runtime-affecting change detected."
            exit 0
          fi

          echo "runtime_changed=false" >> "$GITHUB_OUTPUT"
          echo "No runtime-affecting changes detected; image publish will be skipped."

  publish-images:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.detect-runtime-changes.outputs.runtime_changed == 'true'
    needs:
      - build-test
      - detect-runtime-changes
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    env:
      WEB_IMAGE: ghcr.io/erhanrdn/omniads-web
      WORKER_IMAGE: ghcr.io/erhanrdn/omniads-worker
      BUILD_CACHE_SCOPE: app-image-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: web-runner
          push: true
          provenance: false
          build-args: |
            APP_BUILD_ID=${{ github.sha }}
          tags: |
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ env.BUILD_CACHE_SCOPE }}
          cache-to: type=gha,mode=max,scope=${{ env.BUILD_CACHE_SCOPE }}

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: worker-runner
          push: true
          provenance: false
          build-args: |
            APP_BUILD_ID=${{ github.sha }}
          tags: |
            ${{ env.WORKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ env.BUILD_CACHE_SCOPE }}
          cache-to: type=gha,mode=max,scope=${{ env.BUILD_CACHE_SCOPE }}

  dispatch-deploy:
    if: >-
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.detect-runtime-changes.outputs.runtime_changed == 'true' &&
      needs.publish-images.result == 'success'
    needs:
      - publish-images
      - detect-runtime-changes
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Dispatch deploy workflow
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          DEPLOY_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          curl -fsSL \
            -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPOSITORY}/actions/workflows/deploy-hetzner.yml/dispatches" \
            -d @- <<EOF
          {
            "ref": "main",
            "inputs": {
              "sha": "${DEPLOY_SHA}",
              "require_current_main_head": "true"
            }
          }
          EOF

  skip-runtime-deploy:
    if: >-
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.detect-runtime-changes.outputs.runtime_changed != 'true'
    needs:
      - build-test
      - detect-runtime-changes
    runs-on: ubuntu-latest
    steps:
      - name: Explain deploy skip
        shell: bash
        run: |
          echo "No runtime-affecting files changed."
          echo "Image publish and deploy were intentionally skipped."
