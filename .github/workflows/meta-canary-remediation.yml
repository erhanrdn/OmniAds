name: Meta Canary Remediation

on:
  workflow_dispatch:
    inputs:
      expected_build_id:
        description: Exact deployed build SHA to remediate
        required: true
        type: string
      success_mode:
        description: Proof validates the audited remediation chain; clearance requires full canary recovery
        required: false
        default: proof
        type: choice
        options:
          - proof
          - clearance
      business_ids:
        description: Comma-separated business ids
        required: false
        default: "172d0ab8-495b-4679-a4c6-ffa404c389d3,5dbc7147-f051-4681-a4d6-20617170074f,f8a3b5ac-588c-462f-8702-11cd24ff3cd2"
        type: string

concurrency:
  group: meta-canary-remediation-production
  cancel-in-progress: false

jobs:
  remediate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Resolve pinned control-plane rows
        id: control_plane
        shell: bash
        env:
          EXPECTED_BUILD_ID: ${{ inputs.expected_build_id }}
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
          HETZNER_PORT: ${{ secrets.HETZNER_PORT }}
          HETZNER_KNOWN_HOSTS: ${{ secrets.HETZNER_KNOWN_HOSTS }}
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${HETZNER_USER}" ] || [ -z "${HETZNER_SSH_KEY}" ] || [ -z "${HETZNER_KNOWN_HOSTS}" ]; then
            echo "Missing required Hetzner remediation secrets."
            exit 1
          fi

          resolve_host() {
            host="$1"
            if [ -z "${host}" ]; then
              return 0
            fi
            python3 -c 'import socket, sys; print(socket.gethostbyname(sys.argv[1]))' "${host}" 2>/dev/null || printf '%s\n' "${host}"
          }

          PRIMARY_HOST="${HETZNER_HOST}"
          if [ -z "${PRIMARY_HOST}" ]; then
            PRIMARY_HOST="$(resolve_host "adsecute.com")"
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${HETZNER_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${HETZNER_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          ssh-keyscan -H "${PRIMARY_HOST}" 2>/dev/null >> ~/.ssh/known_hosts || true
          chmod 644 ~/.ssh/known_hosts

          PORT="${HETZNER_PORT:-22}"
          SSH_OPTS=(
            -i ~/.ssh/id_ed25519
            -p "${PORT}"
            -o BatchMode=yes
            -o ServerAliveInterval=30
            -o ServerAliveCountMax=6
            -o TCPKeepAlive=yes
          )

          ssh "${SSH_OPTS[@]}" "${HETZNER_USER}@${PRIMARY_HOST}" \
            "EXPECTED_BUILD_ID='${EXPECTED_BUILD_ID}' bash -seuo pipefail" <<'EOF' > control-plane-status.json
            cd /var/www/adsecute

            attempts=12
            delay_seconds=5

            for attempt in $(seq 1 "${attempts}"); do
              build_info_json="$(curl -fsS http://127.0.0.1:3000/api/build-info)"

              if BUILD_INFO_JSON="${build_info_json}" EXPECTED_BUILD_ID="${EXPECTED_BUILD_ID}" python3 -c 'import json, os, sys; payload = json.loads(os.environ["BUILD_INFO_JSON"]); expected = os.environ["EXPECTED_BUILD_ID"].strip(); identity = payload.get("controlPlaneIdentity") or {}; sys.exit(0 if ((payload.get("buildId") or "").strip() == expected and (identity.get("buildId") or "").strip() == expected and ((payload.get("controlPlanePersistence") or {}).get("exactRowsPresent")) is True) else 1)'
              then
                printf '%s\n' "${build_info_json}"
                exit 0
              fi

              if [ "${attempt}" -lt "${attempts}" ]; then
                sleep "${delay_seconds}"
              fi
            done

            printf '%s\n' "${build_info_json}"
            exit 1
          EOF

          python3 - <<'PY'
          import json, os, sys

          with open("control-plane-status.json", "r", encoding="utf-8") as fh:
            payload = json.load(fh)

          expected_build_id = os.environ["EXPECTED_BUILD_ID"].strip()
          control_plane_identity = payload.get("controlPlaneIdentity") or {}
          control_plane_persistence = payload.get("controlPlanePersistence") or {}
          exact = control_plane_persistence.get("exact") or {}
          build_id = (payload.get("buildId") or "").strip()
          identity_build_id = (control_plane_identity.get("buildId") or "").strip()
          deploy_gate = payload.get("deployGate") or {}
          release_gate = payload.get("releaseGate") or {}
          repair_plan = payload.get("repairPlan") or {}

          if build_id != expected_build_id:
            raise SystemExit(f"Live build {build_id or '<missing>'} does not match expected {expected_build_id}.")
          if identity_build_id != expected_build_id:
            raise SystemExit(
              f"Control-plane identity build {identity_build_id or '<missing>'} does not match expected {expected_build_id}."
            )
          if control_plane_persistence.get("exactRowsPresent") is not True:
            raise SystemExit("Exact current-build control-plane rows are required before remediation.")
          if deploy_gate.get("verdict") != "pass":
            raise SystemExit("deployGate must be pass before remediation.")
          if repair_plan.get("eligible") is not True:
            raise SystemExit("repairPlan must be eligible before remediation.")

          release_gate_id = ((exact.get("releaseGate") or {}).get("id") or (release_gate.get("id") or "")).strip()
          repair_plan_id = ((exact.get("repairPlan") or {}).get("id") or (repair_plan.get("id") or "")).strip()
          if not release_gate_id or not repair_plan_id:
            raise SystemExit("Pinned releaseGate.id and repairPlan.id are required.")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
            fh.write(f"release_gate_id={release_gate_id}\n")
            fh.write(f"repair_plan_id={repair_plan_id}\n")
          PY

      - name: Run remediation over SSH
        env:
          EXPECTED_BUILD_ID: ${{ inputs.expected_build_id }}
          SUCCESS_MODE: ${{ inputs.success_mode }}
          BUSINESS_IDS: ${{ inputs.business_ids }}
          RELEASE_GATE_ID: ${{ steps.control_plane.outputs.release_gate_id }}
          REPAIR_PLAN_ID: ${{ steps.control_plane.outputs.repair_plan_id }}
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
          HETZNER_PORT: ${{ secrets.HETZNER_PORT }}
          HETZNER_KNOWN_HOSTS: ${{ secrets.HETZNER_KNOWN_HOSTS }}
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_ACTOR: ${{ github.actor }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${HETZNER_USER}" ] || [ -z "${HETZNER_SSH_KEY}" ] || [ -z "${HETZNER_KNOWN_HOSTS}" ]; then
            echo "Missing required Hetzner remediation secrets."
            exit 1
          fi

          resolve_host() {
            host="$1"
            if [ -z "${host}" ]; then
              return 0
            fi
            python3 -c 'import socket, sys; print(socket.gethostbyname(sys.argv[1]))' "${host}" 2>/dev/null || printf '%s\n' "${host}"
          }

          PRIMARY_HOST="${HETZNER_HOST}"
          if [ -z "${PRIMARY_HOST}" ]; then
            PRIMARY_HOST="$(resolve_host "adsecute.com")"
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${HETZNER_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${HETZNER_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          ssh-keyscan -H "${PRIMARY_HOST}" 2>/dev/null >> ~/.ssh/known_hosts || true
          chmod 644 ~/.ssh/known_hosts

          PORT="${HETZNER_PORT:-22}"
          SSH_OPTS=(
            -i ~/.ssh/id_ed25519
            -p "${PORT}"
            -o BatchMode=yes
            -o ServerAliveInterval=30
            -o ServerAliveCountMax=6
            -o TCPKeepAlive=yes
          )

          ssh "${SSH_OPTS[@]}" "${HETZNER_USER}@${PRIMARY_HOST}" \
            "EXPECTED_BUILD_ID='${EXPECTED_BUILD_ID}' RELEASE_GATE_ID='${RELEASE_GATE_ID}' REPAIR_PLAN_ID='${REPAIR_PLAN_ID}' SUCCESS_MODE='${SUCCESS_MODE}' BUSINESS_IDS='${BUSINESS_IDS}' GITHUB_RUN_ID='${GITHUB_RUN_ID}' GITHUB_ACTOR='${GITHUB_ACTOR}' bash -seuo pipefail" <<'EOF'
            cd /var/www/adsecute

            docker compose exec -T \
              -e NODE_ENV=production \
              -e EXPECTED_BUILD_ID="${EXPECTED_BUILD_ID}" \
              -e RELEASE_GATE_ID="${RELEASE_GATE_ID}" \
              -e REPAIR_PLAN_ID="${REPAIR_PLAN_ID}" \
              -e SUCCESS_MODE="${SUCCESS_MODE}" \
              -e BUSINESS_IDS="${BUSINESS_IDS}" \
              -e GITHUB_RUN_ID="${GITHUB_RUN_ID}" \
              -e GITHUB_ACTOR="${GITHUB_ACTOR}" \
              worker sh -lc '
                unset SYNC_WORKER_MODE
                business_flag=""
                if [ -n "${BUSINESS_IDS}" ]; then
                  business_flag=" --business-ids ${BUSINESS_IDS}"
                fi
                node --import tsx scripts/meta-canary-remediate.ts \
                  --expected-build-id "${EXPECTED_BUILD_ID}" \
                  --release-gate-id "${RELEASE_GATE_ID}" \
                  --repair-plan-id "${REPAIR_PLAN_ID}" \
                  --success-mode "${SUCCESS_MODE}"${business_flag}
              '
          EOF | tee remediation-result.json

      - name: Wait for post-run remediation summary
        if: always()
        env:
          EXPECTED_BUILD_ID: ${{ inputs.expected_build_id }}
        shell: bash
        run: |
          set -euo pipefail
          attempts=12
          delay_seconds=5

          for attempt in $(seq 1 "${attempts}"); do
            curl -fsSL https://adsecute.com/api/build-info > build-info-final.json
            if python3 -c 'import json, os, sys; payload = json.load(open("build-info-final.json", "r", encoding="utf-8")); summary = payload.get("remediationSummary"); expected = os.environ["EXPECTED_BUILD_ID"].strip(); sys.exit(0 if ((payload.get("buildId") or "").strip() == expected and isinstance(summary, dict) and (summary.get("buildId") or "").strip() == expected) else 1)'
            then
              exit 0
            fi

            if [ "${attempt}" -lt "${attempts}" ]; then
              sleep "${delay_seconds}"
            fi
          done

          echo "Timed out waiting for remediationSummary for build ${EXPECTED_BUILD_ID}."
          cat build-info-final.json
          exit 1

      - name: Write remediation summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          summary_path = os.environ["GITHUB_STEP_SUMMARY"]
          result = {}
          build_info = {}

          if Path("remediation-result.json").exists():
              try:
                  result = json.loads(Path("remediation-result.json").read_text(encoding="utf-8"))
              except json.JSONDecodeError:
                  result = {"parseError": "remediation-result.json was not valid JSON"}

          if Path("build-info-final.json").exists():
              try:
                  build_info = json.loads(Path("build-info-final.json").read_text(encoding="utf-8"))
              except json.JSONDecodeError:
                  build_info = {"parseError": "build-info-final.json was not valid JSON"}

          def get_count(key):
              return ((result.get("outcomeCounts") or {}).get(key)) if isinstance(result.get("outcomeCounts"), dict) else None

          lines = [
              "# Meta Canary Remediation",
              "",
              f"- successMode: `{result.get('successMode', 'unknown')}`",
              f"- proofPassed: `{result.get('proofPassed', 'unknown')}`",
              f"- clearancePassed: `{result.get('clearancePassed', 'unknown')}`",
              f"- businessImprovementObserved: `{result.get('businessImprovementObserved', 'unknown')}`",
              f"- buildId: `{result.get('buildId', build_info.get('buildId', 'unknown'))}`",
              f"- remediationSummaryVisible: `{build_info.get('remediationSummary') is not None}`",
              "",
              "## Outcome Counts",
              "",
              f"- cleared: `{get_count('cleared')}`",
              f"- improving_not_cleared: `{get_count('improving_not_cleared')}`",
              f"- no_change: `{get_count('no_change')}`",
              f"- worse: `{get_count('worse')}`",
              f"- manual_follow_up_required: `{get_count('manual_follow_up_required')}`",
              f"- locked: `{get_count('locked')}`",
              "",
              "## Businesses",
              "",
              "| Business | Recommended | Executed | Outcome | Queue | Repair backlog | Validation 24h | Truth ready | Activity | Publish |",
              "| --- | --- | --- | --- | --- | --- | --- | --- | --- | --- |",
          ]

          for execution in result.get("executions", []) if isinstance(result.get("executions"), list) else []:
              before = execution.get("beforeEvidence") or {}
              after = execution.get("afterEvidence") or {}
              lines.append(
                  "| {business} | {recommended} | {executed} | {outcome} | {queue_before}->{queue_after} | {repair_before}->{repair_after} | {validation_before}->{validation_after} | {truth_before}->{truth_after} | {activity_before}->{activity_after} | {publish_before}->{publish_after} |".format(
                      business=execution.get("businessName") or execution.get("businessId") or "unknown",
                      recommended=execution.get("recommendedAction") or "—",
                      executed=execution.get("executedAction") or "—",
                      outcome=execution.get("outcomeClassification") or "—",
                      queue_before=before.get("queueDepth", "—"),
                      queue_after=after.get("queueDepth", "—"),
                      repair_before=before.get("repairBacklog", "—"),
                      repair_after=after.get("repairBacklog", "—"),
                      validation_before=before.get("validationFailures24h", "—"),
                      validation_after=after.get("validationFailures24h", "—"),
                      truth_before=before.get("truthReady", "—"),
                      truth_after=after.get("truthReady", "—"),
                      activity_before=before.get("activityState", "—"),
                      activity_after=after.get("activityState", "—"),
                      publish_before=before.get("lastSuccessfulPublishAt", "—"),
                      publish_after=after.get("lastSuccessfulPublishAt", "—"),
                  )
              )

          if result.get("proofPassed") and not result.get("businessImprovementObserved"):
              lines.extend([
                  "",
                  "> Remediation proof passed without observed business improvement.",
              ])

          Path(summary_path).write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY
