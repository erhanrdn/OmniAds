name: Meta Watch Window

on:
  workflow_dispatch:
    inputs:
      sha:
        description: Exact deploy SHA to verify against live Meta acceptance
        required: true
        type: string
      stability_window_minutes:
        description: Minutes the clean state must remain stable after immediate acceptance
        required: false
        default: "30"
        type: string
      require_block_modes:
        description: Require deploy/release gates to run in block mode
        required: false
        default: "false"
        type: string

jobs:
  watch-window:
    if: inputs.sha != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Resolve expected SHA
        id: expected
        shell: bash
        run: |
          set -euo pipefail

          expected_sha="${{ inputs.sha }}"
          streak_eligible="false"

          if [ -z "${expected_sha}" ]; then
            echo "Expected SHA is required."
            exit 1
          fi

          echo "sha=${expected_sha}" >> "$GITHUB_OUTPUT"
          echo "streak_eligible=${streak_eligible}" >> "$GITHUB_OUTPUT"

      - name: Verify Meta watch window acceptance
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          REQUIRE_BLOCK_MODES: ${{ inputs.require_block_modes }}
          STABILITY_WINDOW_MINUTES: ${{ inputs.stability_window_minutes }}
        run: |
          set -euo pipefail

          extra_args=()
          if [ "${REQUIRE_BLOCK_MODES}" = "true" ]; then
            extra_args+=(--require-block-modes)
          fi
          if [ "${{ steps.expected.outputs.streak_eligible }}" = "true" ]; then
            extra_args+=(--streak-eligible)
          fi

          node --import tsx scripts/meta-watch-window.ts \
            --expected-build-id "${{ steps.expected.outputs.sha }}" \
            --base-url "https://adsecute.com" \
            --attempts 12 \
            --sleep-ms 5000 \
            --stability-window-minutes "${STABILITY_WINDOW_MINUTES}" \
            --stability-poll-ms 60000 \
            --minimum-successful-runs 3 \
            --workflow-file "meta-watch-window.yml" \
            --remediation-workflow-file "meta-canary-remediation.yml" \
            --out-file ".artifacts/meta-watch-window.json" \
            "${extra_args[@]}"

      - name: Write job summary
        shell: bash
        run: |
          python3 - <<'PY'
          import json, os, pathlib

          payload = json.loads(pathlib.Path(".artifacts/meta-watch-window.json").read_text())
          acceptance = payload["acceptance"]
          previous = payload.get("previousConsecutiveSuccessfulRuns")
          current = payload.get("currentConsecutiveSuccessfulRuns")
          lines = [
              "## Meta Watch Window",
              "",
              f"- streakEligible: `{payload.get('streakEligible')}`",
              f"- expectedBuildId: `{payload['expectedBuildId']}`",
              f"- observedBuildId: `{acceptance.get('observedBuildId')}`",
              f"- immediateAccepted: `{acceptance['accepted']}`",
              f"- acceptedAtAttempt: `{payload.get('acceptedAtAttempt')}`",
              f"- cleanDeployAccepted: `{payload.get('cleanDeployAccepted')}`",
              f"- deployGatePass: `{acceptance['deployGatePass']}`",
              f"- deployGateModeBlock: `{acceptance['deployGateModeBlock']}`",
              f"- releaseGatePass: `{acceptance['releaseGatePass']}`",
              f"- releaseGateModeBlock: `{acceptance['releaseGateModeBlock']}`",
              f"- repairPlanEmpty: `{acceptance['repairPlanEmpty']}`",
              f"- exactRowsPresent: `{acceptance['exactRowsPresent']}`",
              f"- stabilityWindowMinutes: `{payload.get('stabilityWindowMinutes')}`",
              f"- stabilityWindowPassed: `{payload.get('stabilityWindowPassed')}`",
              f"- manualRemediationObserved: `{payload.get('manualRemediationObserved')}`",
              f"- manualRemediationCheckPerformed: `{payload.get('manualRemediationCheckPerformed')}`",
              f"- manualRemediationRunCount: `{len(payload.get('manualRemediationRuns') or [])}`",
              f"- previousConsecutiveSuccessfulRuns: `{previous}`",
              f"- currentConsecutiveSuccessfulRuns: `{current}`",
              f"- minimumSuccessfulRuns: `{payload['minimumSuccessfulRuns']}`",
              f"- watchWindowSatisfied: `{payload.get('watchWindowSatisfied')}`",
          ]
          reasons = acceptance.get("reasons") or []
          if reasons:
              lines.extend(["", "Immediate failure reasons:"])
              lines.extend([f"- `{reason}`" for reason in reasons])
          clean_reasons = payload.get("cleanDeployReasons") or []
          if clean_reasons:
              lines.extend(["", "Clean deploy failure reasons:"])
              lines.extend([f"- `{reason}`" for reason in clean_reasons])

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as handle:
              handle.write("\n".join(lines) + "\n")
          PY

      - name: Upload watch artifact
        uses: actions/upload-artifact@v4
        with:
          name: meta-watch-window-${{ steps.expected.outputs.sha }}
          path: .artifacts/meta-watch-window.json
          if-no-files-found: error
