services:
  web:
    image: ghcr.io/erhanrdn/omniads-web:${APP_IMAGE_TAG:-dev-build}
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      APP_BUILD_ID: ${APP_BUILD_ID:-dev-build}
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >
          fetch('http://127.0.0.1:3000/api/build-info').then((response) => {
            if (!response.ok) process.exit(1);
          }).catch(() => process.exit(1))
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s

  worker:
    image: ghcr.io/erhanrdn/omniads-worker:${APP_IMAGE_TAG:-dev-build}
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      APP_BUILD_ID: ${APP_BUILD_ID:-dev-build}
      NODE_ENV: production
      SYNC_WORKER_MODE: "1"
    depends_on:
      - web
    healthcheck:
      test:
        - CMD
        - node
        - --import
        - tsx
        - scripts/sync-worker-healthcheck.ts
        - --provider-scope
        - meta
        - --online-window-minutes
        - "5"
        - --min-online-workers
        - "1"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  migrate:
    image: ghcr.io/erhanrdn/omniads-worker:${APP_IMAGE_TAG:-dev-build}
    env_file:
      - .env.production
    environment:
      APP_BUILD_ID: ${APP_BUILD_ID:-dev-build}
      NODE_ENV: production
    command: ["node", "--import", "tsx", "scripts/run-migrations.ts"]
    restart: "no"
